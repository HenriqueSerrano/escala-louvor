<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EscalaLouvor — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#03213f 0%,#0d3060 50%,#03213f 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
    }
    .login-box{
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,0.1);
      border-top: 3px solid #C5A059;
      border-radius:22px;
      padding:44px 40px 36px;
      width:100%;max-width:400px;
      box-shadow:0 30px 70px rgba(0,0,0,0.5);
    }

    /* LOGO */
    .logo-wrap{
      text-align:center;margin-bottom:28px;
    }
    .logo-wrap img{
      max-width:180px;max-height:90px;object-fit:contain;
      filter:brightness(1.05);
    }
    .logo-wrap h1{
      color:#fff;font-size:1.15rem;font-weight:600;
      margin-top:14px;letter-spacing:.5px;
    }
    .logo-wrap p{
      color:rgba(255,255,255,.45);font-size:.8rem;margin-top:3px;
    }

    /* CAMPOS */
    .field{margin-bottom:16px;}
    .field label{
      display:block;color:rgba(255,255,255,.55);
      font-size:.75rem;font-weight:500;
      margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em;
    }
    .field input{
      width:100%;
      background:rgba(255,255,255,.07);
      border:1.5px solid rgba(255,255,255,.12);
      color:#fff;padding:12px 15px;border-radius:11px;
      font-family:'Poppins',sans-serif;font-size:.9rem;transition:.3s;
    }
    .field input:focus{
      outline:none;
      border-color:#C5A059;
      background:rgba(197,160,89,.1);
      box-shadow:0 0 0 3px rgba(197,160,89,.15);
    }
    .field input::placeholder{color:rgba(255,255,255,.2);}

    /* BOTÃO */
    .btn-login{
      width:100%;padding:13px;
      background:linear-gradient(135deg,#b48d48,#C5A059);
      color:#fff;border:none;border-radius:11px;
      font-family:'Poppins',sans-serif;font-weight:600;
      font-size:.95rem;cursor:pointer;transition:.3s;
      display:flex;align-items:center;justify-content:center;gap:8px;
      margin-top:6px;
    }
    .btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(197,160,89,.4);}
    .btn-login:active{transform:none;}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}

    /* MSG */
    .msg-erro{
      margin-top:14px;padding:10px 14px;border-radius:10px;
      font-size:.84rem;display:none;text-align:center;
      background:rgba(239,68,68,.15);color:#fca5a5;
      border:1px solid rgba(239,68,68,.3);
    }
    .rodape{text-align:center;margin-top:24px;color:rgba(255,255,255,.2);font-size:.7rem;}
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-wrap">
      <img src="logo-esq.png" alt="Logo Grupo de Música" onerror="this.style.display='none'">
      <h1>Grupo de Música</h1>
      <p>Verbo da Vida Casa Caiada</p>
    </div>

    <div class="field">
      <label><i class="fas fa-envelope"></i> E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="username">
    </div>
    <div class="field">
      <label><i class="fas fa-lock"></i> Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btn-entrar" onclick="fazerLogin()">
      <i class="fas fa-sign-in-alt"></i> Entrar
    </button>
    <div class="msg-erro" id="msg-login"></div>
    <div class="rodape">EscalaLouvor v2.0</div>
  </div>

  <script>
    document.addEventListener("keydown", e => { if(e.key==="Enter") fazerLogin(); });

    async function fazerLogin(){
      const btn = document.getElementById("btn-entrar");
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;
      const msg   = document.getElementById("msg-login");

      msg.style.display = "none";
      if(!email || !senha){ mostrarErro("Preencha e-mail e senha."); return; }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

      try{
        const res  = await fetch("/users/login",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email,senha}) });
        const data = await res.json();
        if(!res.ok) throw new Error(data.erro || "Erro ao fazer login");
        localStorage.setItem("auth", JSON.stringify(data));
        window.location.href = "/app";
      }catch(err){
        mostrarErro(err.message);
      }finally{
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
      }
    }

    function mostrarErro(msg){
      const el = document.getElementById("msg-login");
      el.textContent = msg;
      el.style.display = "block";
    }
  </script>
</body>
</html>
