<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EscalaLouvor — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#0a0f1e 0%,#0d1b3e 50%,#0a1628 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .login-box{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 25px 60px rgba(0,0,0,0.5);}
    .logo {margin-bottom: 20px;}
    .logo img {width: 180px;}
    .logo-area{text-align:center;margin-bottom:36px;}
    .logo-area .icon{width:64px;height:64px;background:linear-gradient(135deg,#1a56db,#3b82f6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(59,130,246,0.4);}
    .logo-area .icon i{color:#fff;font-size:28px;}
    .logo-area h1{color:#fff;font-size:1.4rem;font-weight:600;letter-spacing:0.5px;}
    .logo-area p{color:rgba(255,255,255,0.45);font-size:0.82rem;margin-top:4px;}
    .field{margin-bottom:18px;}
    .field label{display:block;color:rgba(255,255,255,0.6);font-size:0.78rem;font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;}
    .field input{width:100%;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);color:#fff;padding:13px 16px;border-radius:12px;font-family:'Poppins',sans-serif;font-size:0.9rem;transition:0.3s;}
    .field input:focus{outline:none;border-color:#3b82f6;background:rgba(59,130,246,0.08);box-shadow:0 0 0 3px rgba(59,130,246,0.15);}
    .field input::placeholder{color:rgba(255,255,255,0.25);}
    .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#1a56db,#3b82f6);color:#fff;border:none;border-radius:12px;font-family:'Poppins',sans-serif;font-weight:600;font-size:0.95rem;cursor:pointer;transition:0.3s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
    .btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(59,130,246,0.45);}
    .btn-login:active{transform:none;}
    .msg{margin-top:14px;padding:10px 14px;border-radius:10px;font-size:0.85rem;display:none;text-align:center;}
    .msg-erro{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);}
    .rodape{text-align:center;margin-top:28px;color:rgba(255,255,255,0.2);font-size:0.72rem;}
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-area">
    <div class="logo">
       <img class="logo" id="logo-esq" alt="logo">
    </div>
      <h1>Grupo de Música</h1>
      <p>Verbo da Vida Casa Caiada</p>
    </div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="username">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-entrar" onclick="fazerLogin()">
      <i class="fas fa-sign-in-alt"></i> Entrar
    </button>
    <div class="msg msg-erro" id="msg-login"></div>
    <div class="rodape">EscalaLouvor v2.0</div>
  </div>

  <script>
    document.addEventListener("keydown", e => { if(e.key==="Enter") fazerLogin(); });

    async function fazerLogin(){
      const btn = document.getElementById("btn-entrar");
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;
      const msg = document.getElementById("msg-login");

      msg.style.display="none";
      if(!email||!senha){ mostrarErro("Preencha e-mail e senha."); return; }

      btn.disabled=true;
      btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Entrando...';

      try{
        const res = await fetch("/users/login",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({email,senha})
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.erro||"Erro ao fazer login");
        localStorage.setItem("auth", JSON.stringify(data));
        window.location.href="/app";
      }catch(err){
        mostrarErro(err.message);
      }finally{
        btn.disabled=false;
        btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Entrar';
      }
    }

    function mostrarErro(msg){
      const el=document.getElementById("msg-login");
      el.textContent=msg;
      el.style.display="block";
    }
  </script>
</body>
</html>
