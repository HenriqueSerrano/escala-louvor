<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Escala Grupo de Música</title>
<style>
  @page { size: A4 landscape; margin: 14mm 16mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; color: #1a1a2e; background: #fff; font-size: 11px; padding: 10px 4px 6px; }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 8px; margin-bottom: 10px;
    border-bottom: 4px solid #03213f;
  }
  .logo-box { width: 130px; height: 65px; display: flex; align-items: center; justify-content: center; }
  .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .header-center { text-align: center; flex: 1; padding: 0 16px; }
  .header-center h1 {
    font-size: 18px; font-weight: 800; color: #03213f;
    text-transform: uppercase; letter-spacing: 2px;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .header-center .sub { font-size: 11px; color: #555; margin-top: 3px; }
  .header-meta { display: flex; gap: 10px; justify-content: center; margin-top: 6px; }
  .meta-pill {
    background: #03213f; color: #fff;
    padding: 3px 14px; border-radius: 20px;
    font-size: 10.5px; font-weight: 600;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .meta-pill b { color: #ffd27a; }

  /* ── TABELA ── */
  table { width: 100%; border-collapse: collapse; margin-top: 0; font-size: 10.5px; table-layout: fixed; }

  /* Cabeçalho */
  thead tr th {
    background: #03213f; color: #fff;
    padding: 7px 5px; text-align: center;
    font-weight: 700; font-size: 9.5px;
    text-transform: uppercase; letter-spacing: .4px;
    border-right: 1px solid rgba(255,255,255,.15);
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  thead tr th:last-child { border-right: none; }

  /* Sub-cabeçalho de categoria (instrumental) */
  .th-cat { font-size: 9px !important; font-weight: 600 !important; letter-spacing: 0 !important; }

  /* Linha de semana */
  .row-semana td {
    background: #1a56a0;
    color: #fff;
    font-weight: 700; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: .8px;
    padding: 5px 10px; text-align: center;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }

  /* Linhas normais */
  tbody tr.row-data td {
    padding: 6px 5px;
    border-bottom: 1px solid #e8ecf2;
    border-right: 1px solid #f0f3f7;
    text-align: center; vertical-align: middle;
  }
  tbody tr.row-data td:last-child { border-right: none; }
  tbody tr.row-data:nth-child(even):not(.row-semana) td {
    background: #f7f9fc;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }

  /* DATA */
  .col-data { font-weight: 700; font-size: 11px; color: #03213f; }
  .col-dia { font-size: 9px; color: #888; margin-top: 1px; }

  /* EVENTO */
  .ev-badge {
    display: inline-block;
    background: #eaf0f8; color: #03213f;
    border: 1px solid #bed0e8;
    padding: 2px 7px; border-radius: 20px;
    font-size: 9px; font-weight: 600;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }

  /* MINISTRO */
  .col-ministro { font-weight: 700; font-size: 11px; color: #222; }

  /* BACKS */
  .col-backs { font-size: 10.5px; color: #222; line-height: 1.4; font-weight: 700; }

  /* INSTRUMENTO — célula individual */
  .instr-nome { font-size: 10.5px; color: #222; font-weight: 700; }
  .instr-vazio { font-size: 9px; color: #ccc; }
  .tb-badge {
    display: inline-block;
    background: #C5A059; color: #fff;
    font-size: 7.5px; font-weight: 800;
    padding: 1px 4px; border-radius: 3px;
    margin-left: 2px; vertical-align: middle;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }

  /* RODAPÉ */
  .pdf-footer {
    margin-top: 8px; display: flex;
    justify-content: space-between; align-items: center;
    font-size: 8px; color: #aaa;
    border-top: 1px solid #eee; padding-top: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-box">
    <img id="logo-left" alt="" onerror="this.style.visibility='hidden'">
  </div>
  <div class="header-center">
    <h1>Grupo de Música Verbo Casa Caiada</h1>
    <div class="sub">Verbo da Vida Casa Caiada</div>
    <div class="header-meta">
      <div class="meta-pill">Mês: <b id="span-mes"></b></div>
      <div class="meta-pill">Gerado em: <b id="span-data"></b></div>
    </div>
  </div>
  <div class="logo-box">
    <img id="logo-right" alt="" onerror="this.style.visibility='hidden'">
  </div>
</div>

<div style="text-align:right;font-size:9px;color:#777;margin:5px 0 4px;">
  <span style="background:#C5A059;color:#fff;padding:1px 5px;border-radius:3px;font-weight:800;font-size:8.5px;letter-spacing:.3px;">TB</span>
  &nbsp;— Talkback
</div>

<table id="pdf-table">
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<div class="pdf-footer">
  <span>EscalaLouvor v2.0 — Grupo de Música Verbo da Vida Casa Caiada</span>
  <span id="rodape-data"></span>
</div>

<script>
window.__PDF_READY__ = false;

function esc(v){ if(v==null)return""; return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function semanaMes(dataStr){
  const [d,m,y]=String(dataStr||"").split("/").map(Number);
  return Math.ceil((d + new Date(y,m-1,1).getDay()) / 7);
}

function renderPdfTemplate(payload){
  const dados = payload || {};
  const eventos = Array.isArray(dados.eventos) ? [...dados.eventos] : [];
  const catsInstr = Array.isArray(dados.catsInstr) ? dados.catsInstr : [];

  document.getElementById("span-mes").textContent  = dados.mes || "";
  document.getElementById("span-data").textContent = new Date().toLocaleDateString("pt-BR");
  document.getElementById("rodape-data").textContent = "Gerado em " + new Date().toLocaleString("pt-BR");

  function setLogo(id,src){ const el=document.getElementById(id); if(!src){el.style.visibility="hidden";return;} el.src=src; el.onerror=()=>el.style.visibility="hidden"; }
  setLogo("logo-left",  dados.logoLeft  || "logo-esq.png");
  setLogo("logo-right", dados.logoRight || "logo-pdf.png");

  // Calcular larguras: fixas para as primeiras colunas, resto dividido pelos instrumentos
  // A4 landscape ≈ 277mm úteis
  // Data 48 | Evento 70 | Ministro 75 | Backs 100 | (restante dividido por n instrumentos)
  const nInstr = catsInstr.length || 1;
  const wFixed = 48 + 70 + 75 + 100;
  // percentuais aproximados
  const pData   = "6%";
  const pEvento = "9%";
  const pMin    = "9%";
  const pBacks  = "12%";
  const pInstr  = `${Math.floor(64 / nInstr)}%`;

  // CABEÇALHO
  const thead = document.getElementById("thead");
  let thHtml = `<tr>
    <th style="width:${pData}">Data</th>
    <th style="width:${pEvento}">Evento</th>
    <th style="width:${pMin}">Ministro</th>
    <th style="width:${pBacks}">Backing Vocal</th>
    ${catsInstr.map(c=>`<th class="th-cat" style="width:${pInstr}">${esc(c.nome)}</th>`).join("")}
  </tr>`;
  thead.innerHTML = thHtml;

  // DADOS
  eventos.sort((a,b)=>{
    const p=s=>{const[d,m,y]=String(s||"").split("/");return new Date(y,m-1,d);};
    return p(a.data)-p(b.data);
  });

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  if(!eventos.length){
    tbody.innerHTML=`<tr class="row-data"><td colspan="${4+nInstr}" style="text-align:center;padding:20px;color:#aaa;">Nenhuma escala encontrada.</td></tr>`;
    window.__PDF_READY__=true; return;
  }

  const semanas = {};
  eventos.forEach(ev=>{ const s=semanaMes(ev.data); if(!semanas[s])semanas[s]=[]; semanas[s].push(ev); });

  Object.keys(semanas).sort((a,b)=>Number(a)-Number(b)).forEach(semana=>{
    const trSem=document.createElement("tr");
    trSem.className="row-semana";
    trSem.innerHTML=`<td colspan="${4+nInstr}">Semana ${esc(semana)}</td>`;
    tbody.appendChild(trSem);

    semanas[semana].forEach(ev=>{
      const instrCols = ev.instrCols || {};
      const instrCells = catsInstr.map(cat=>{
        const col = instrCols[cat.id];
        if(!col || col.nome==="-"){
          return `<td><span class="instr-vazio">—</span></td>`;
        }
        return `<td><span class="instr-nome">${esc(col.nome)}</span>${col.isTb?`<span class="tb-badge">TB</span>`:""}</td>`;
      }).join("");

      const tr=document.createElement("tr");
      tr.className="row-data";
      tr.innerHTML=`
        <td><div class="col-data">${esc(ev.data||"")}</div><div class="col-dia">${esc(ev.dia||"")}</div></td>
        <td><span class="ev-badge">${esc(ev.evento||"")}</span></td>
        <td class="col-ministro">${esc(ev.ministro||"-")}</td>
        <td class="col-backs">${esc(ev.backs||"-")}</td>
        ${instrCells}
      `;
      tbody.appendChild(tr);
    });
  });

  window.__PDF_READY__ = true;
}

window.renderPdfTemplate = renderPdfTemplate;
window.addEventListener("DOMContentLoaded", ()=>{ if(window.PDF_PAYLOAD) renderPdfTemplate(window.PDF_PAYLOAD); });
</script>
</body>
</html>
